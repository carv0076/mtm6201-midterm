<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midterm Project</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header>
        <nav>
            <img src="images/my-coffee-shop-logo.svg" alt="Coffe Shop Logo">
            <ul>
                <li><a href="">About Us</a></li>
                <li><a href="">Menu</a></li>
                <li><a href="">Locations</a></li>
            </ul>
        </nav>

        <button class="menu-toggle" aria-label="open menu">
            <svg class="icon menu-icon" xmlns="http://w3.org" viewBox="0 0 24 24" width="24" height="24">
                <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" fill="currentColor"/>
            </svg>
        </button>
    </header>

    <main>
        <div class="hero">
            <img src="images/hero-background.jpg" alt="Image of a barista smiling while serving a customer">
            <h1>Experience Coffee Like Never Before</h1>
            <p>We craft more than beverages; we curate memories, one flavourful moment at a time. Embrace the aroma and let every visit be a chapter in your coffee story.</p>
            <button><a href="">Explore our menu</a></button>
        </div>

        <div>
            <h3>Welcome to My Coffee House</h3>
            <h2>Experience A New Way To Taste Coffee</h2>
            <img src="images/latte.jpeg" alt="Image of latte art">
            <img src="images/coffee-beans.jpeg" alt="Image of a cup of coffee beans">
            <img src="images/pouring-coffee.jpeg" alt="Image of someone pouring a cup of coffee">
            <img src="images/three-cups.jpeg" alt="Image of three cups of coffee arranged in a triangle">
            <img src="images/smiling-employee.jpeg" alt="Image of a smiling barista">
        </div>
    </main>
    
</body>
</html>
