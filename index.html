<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midterm Project</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header>
        <nav>
            <img src="images/my-coffee-shop-logo.svg" alt="Coffe Shop Logo">
            <ul>
                <li><a href="">About Us</a></li>
                <li><a href="">Menu</a></li>
                <li><a href="">Locations</a></li>
            </ul>
        </nav>

        <button class="menu-toggle" aria-label="open menu">
            <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="none">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
    </header>

    <main>
        <div class="hero">
            <img src="images/hero-background.jpg" alt="">
            <h1>Experience Coffee Like Never Before</h1>
            <p>We craft more than beverages; we curate memories, one flavourful moment at a time. Embrace the aroma and let every visit be a chapter in your coffee story.</p>
            <button><a href="">Explore our menu</a></button>
        </div>
    </main>
    
</body>
</html>
